# GCP Pub/Sub
gcp.project.id=your-gcp-project-id
pubsub.subscription.id=your-subscription-id
pubsub.max.outstanding.messages=1000
pubsub.max.outstanding.bytes=104857600

# Snowflake channel
snowflake.channel.name=PUBSUB_CHANNEL
snowflake.database=TEST_DATABASE
snowflake.schema=TEST_SCHEMA
snowflake.table=CALL_DETAIL_RECORDS

# Path to Snowflake profile JSON (contains account, user, role, private key)
snowflake.profile.path=profile.json

# Consumer tuning
max.rows.per.append=100
consumer.thread.count=1

# Kafka broker
kafka.bootstrap.servers=localhost:9092
kafka.topic=test-topic

# Producer tuning
producer.acks=all
producer.linger.ms=5
producer.batch.size=16384

# Default burst size (used by "burst" command when no argument given)
default.burst.count=100

# Default stream rate in records/sec (used by "stream" command when no argument given)
default.stream.rps=10
